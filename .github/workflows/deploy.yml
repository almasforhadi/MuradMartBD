name: Django CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t eshop .

    - name: Run Container Test
      run: |
        docker run -d -p 8000:8000 eshop
        sleep 10

    - name: Success
      run: echo "Build Successful 🚀"
