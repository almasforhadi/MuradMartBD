{% extends 'base.html' %}
{% block body_class %}change_password{% endblock %}
{% load crispy_forms_tags %}


{% block content %}
<div class="container py-5"
     style="
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
     ">

    <div class="row justify-content-center w-100">
        <div class="col-lg-6 col-md-8"
             style="
                background: #ffffff;
                border-radius: 14px;
                padding: 2.2rem 2rem;
                box-shadow: 0 10px 28px rgba(0,0,0,0.08);
             ">

            <h2 class="mb-4 text-center fw-bold"
                style="color:#1faa59; font-size:1.7rem;">
                পাসওয়ার্ড পরিবর্তন করুন
            </h2>

            <form method="post">
                {% csrf_token %}

                {% for fm in form %}
                    <div class="mb-3">
                        {{ fm.label_tag }}

                        {{ fm }}

                        <div style="font-size:0.8rem; color:#dc2626; margin-top:4px;">
                            {{ fm.errors }}
                        </div>
                    </div>
                {% endfor %}

                <div class="d-grid">
                    <button type="submit"
                            class="btn mt-3"
                            style="
                                background: linear-gradient(135deg,#1faa59,#148347);
                                color:#fff;
                                border:none;
                                border-radius:999px;
                                padding:0.6rem 1.2rem;
                                font-weight:600;
                                font-size:1rem;
                            ">
                        পাসওয়ার্ড পরিবর্তন করুন
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
